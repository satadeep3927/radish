<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFFFFF" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <title>Radish Studio</title>
    <style>
      html, body { margin: 0; overflow: hidden; background: #FFFFFF; height: 100%; }
      #root { height: 100%; }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="radish-loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%;background:#FFFFFF;color:#4B5563;font-family:Inter,system-ui,sans-serif;gap:16px;">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="20" width="12" height="16" rx="2" fill="#C8001A" opacity="0.3">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0s" repeatCount="indefinite"/>
          </rect>
          <rect x="24" y="12" width="12" height="24" rx="2" fill="#C8001A" opacity="0.3">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
          </rect>
          <rect x="24" y="4" width="4" height="4" rx="1" fill="#E53935" opacity="0.5">
            <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
          </rect>
        </svg>
        <span style="font-size:14px;font-weight:500;letter-spacing:0.5px;">Radish Studio</span>
      </div>
    </div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
